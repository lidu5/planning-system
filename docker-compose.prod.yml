version: "3.9"

services:
  # =============================================
  # BACKEND (Django)
  # =============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: moa-backend-prod
    restart: unless-stopped
    expose:
      - "8000"  # Only internal to Docker network
    environment:
      - DJANGO_SETTINGS_MODULE=moa_agriplan_system.settings
      - DEBUG=False
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=moa_production
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db-prod
      - DB_PORT=5432
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=localhost,127.0.0.1,10.10.20.233,196.188.248.104,pms.moa.gov.et
      - CORS_ALLOWED_ORIGINS=https://pms.moa.gov.et,http://localhost:3000,http://10.10.20.233:3000,http://10.10.20.233:8080
      - CSRF_TRUSTED_ORIGINS=https://pms.moa.gov.et,http://localhost:3000,http://10.10.20.233:3000,http://10.10.20.233:8080
    depends_on:
      - db-prod

  # =============================================
  # FRONTEND (React / Vite)
  # =============================================
  frontend:
    build:
      context: ./frontend/planning-vite
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=https://pms.moa.gov.et/api  # ✅ HTTPS API
    container_name: moa-frontend-prod
    restart: unless-stopped
    expose:
      - "80"  # Only internal, Nginx handles public
    depends_on:
      - backend

  # =============================================
  # NGINX (Reverse Proxy + SSL)
  # =============================================
  nginx:
    image: nginx:alpine
    container_name: moa-nginx-prod
    restart: unless-stopped
    volumes:
      - ./nginx/moa-planning-system.conf:/etc/nginx/conf.d/default.conf
      - ./backend/static:/home/moapms/moa-planning-system/backend/static:ro
      - ./backend/media:/home/moapms/moa-planning-system/backend/media:ro
      - ./ssl:/etc/ssl/moa:ro  # Mount your SSL certs here
    ports:
      - "80:80"     # HTTP redirect to HTTPS
      - "443:443"   # HTTPS
    depends_on:
      - frontend
      - backend

  # =============================================
  # POSTGRESQL DATABASE
  # =============================================
  db-prod:
    image: postgres:16-alpine
    container_name: moa-db-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: moa_production
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - db_prod_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"  # Optional external port

# =============================================
# VOLUMES
# =============================================
volumes:
  db_prod_data: