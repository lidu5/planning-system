version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: moa-backend-prod
    restart: unless-stopped
    expose:                      # Change from 'ports' to 'expose'
      - "8000"                   # Only expose internally to Docker network
    environment:
      - DJANGO_SETTINGS_MODULE=moa_agriplan_system.settings
      - DEBUG=False
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=moa_production
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db-prod
      - DB_PORT=5432
      - SECRET_KEY=django-insecure-88#b%1&6ku6g#eyb04)vd1)h5!)*y^79havgg(**w65ewhv+ln
      - ALLOWED_HOSTS=localhost,127.0.0.1,10.10.20.233,196.188.248.104,pms.moa.gov.et
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://10.10.20.233:3000,http://10.10.20.233:8080,http://196.188.248.104:8080,http://pms.moa.gov.et
      - CSRF_TRUSTED_ORIGINS=http://localhost:3000,http://10.10.20.233:3000,http://10.10.20.233:8080,http://196.188.248.104:8080,http://pms.moa.gov.et
    depends_on:
      - db-prod

  frontend:
    build:
      context: ./frontend/planning-vite
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://pms.moa.gov.et  # Use domain, not IP
    container_name: moa-frontend-prod
    restart: unless-stopped
    expose:                      # Change from 'ports' to 'expose'
      - "80"                     # Only expose internally
    depends_on:
      - backend

  nginx:                         # Add this service if missing
    image: nginx:alpine
    container_name: moa-nginx-prod
    restart: unless-stopped
    volumes:
      - ./nginx/moa-planning-system.conf:/etc/nginx/conf.d/default.conf
      - ./backend/static:/home/moapms/moa-planning-system/backend/static:ro
      - ./backend/media:/home/moapms/moa-planning-system/backend/media:ro
      - /home/moapms/moa-planning-system/ssl:/etc/ssl/moa:ro
    ports:
      - "80:80"                  # nginx publishes HTTP
      - "443:443"                # nginx publishes HTTPS
    depends_on:
      - frontend
      - backend

  db-prod:
    image: postgres:16-alpine
    container_name: moa-db-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: moa_production
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - db_prod_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"              # Database port if needed externally

volumes:
  db_prod_data: