version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: moa-backend-prod
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - DJANGO_SETTINGS_MODULE=moa_agriplan_system.settings
      - DEBUG=False
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=moa_production
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db-prod
      - DB_PORT=5432
      - SECRET_KEY=django-insecure-88#b%1&6ku6g#eyb04)vd1)h5!)*y^79havgg(**w65ewhv+ln
      - ALLOWED_HOSTS=localhost,127.0.0.1,10.10.20.233,196.188.248.104,pms.moa.gov.et
      # Updated for HTTPS
      - CORS_ALLOWED_ORIGINS=https://pms.moa.gov.et,https://196.188.248.104
      - CSRF_TRUSTED_ORIGINS=https://pms.moa.gov.et,https://196.188.248.104
      # Add these for Django to properly handle HTTPS
      - SECURE_PROXY_SSL_HEADER=HTTP_X_FORWARDED_PROTO,https
      - SECURE_SSL_REDIRECT=True
      - SESSION_COOKIE_SECURE=True
      - CSRF_COOKIE_SECURE=True
    depends_on:
      - db-prod

  frontend:
    build:
      context: ./frontend/planning-vite
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=https://pms.moa.gov.et  # Updated to HTTPS
    container_name: moa-frontend-prod
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: moa-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"                  # Add HTTPS port
    volumes:
      - ./nginx/moa-planning-system.conf:/etc/nginx/conf.d/default.conf
      - ./backend/static:/home/moapms/moa-planning-system/backend/static:ro
      - ./backend/media:/home/moapms/moa-planning-system/backend/media:ro
      - ./ssl:/etc/nginx/ssl:ro     # Mount SSL certificates
    depends_on:
      - frontend
      - backend

  db-prod:
    image: postgres:16-alpine
    container_name: moa-db-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: moa_production
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - db_prod_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"

volumes:
  db_prod_data: