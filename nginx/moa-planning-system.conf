# ==========================================
# HTTP → HTTPS Redirect
# ==========================================
server {
    listen 80;
    server_name pms.moa.gov.et;

    return 301 https://$host$request_uri;
}

# ==========================================
# HTTPS SERVER
# ==========================================
server {

    listen 443 ssl;
    server_name pms.moa.gov.et;

    ssl_certificate /etc/letsencrypt/live/pms.moa.gov.et/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pms.moa.gov.et/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # SECURITY HEADERS
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # GZIP
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # FRONTEND
    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
    }

    # ADMIN
    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # STATIC FILES
    location /static/ {
        alias /home/moapms/moa-planning-system/backend/static/;
        expires 1y;
        access_log off;
    }

    # MEDIA FILES
    location /media/ {
        alias /home/moapms/moa-planning-system/backend/media/;
        expires 30d;
        access_log off;
    }

    # HEALTH CHECK
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

}