# ============================================
# HTTP SERVER - Redirect to HTTPS
# ============================================
server {
    listen 80;
    server_name pms.moa.gov.et 196.188.248.104 10.10.20.233;

    return 301 https://$host$request_uri;
}

# ============================================
# HTTPS SERVER
# ============================================
server {
    listen 443 ssl;
    server_name pms.moa.gov.et 196.188.248.104 10.10.20.233;

    # SSL Certificates
    ssl_certificate /etc/ssl/moa/fullchain1.pem;
    ssl_certificate_key /etc/ssl/moa/privkey2.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # ============================================
    # SECURITY HEADERS
    # ============================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ============================================
    # LOGGING
    # ============================================
    access_log /var/log/nginx/moa-access.log;
    error_log /var/log/nginx/moa-error.log warn;

    # ============================================
    # FRONTEND
    # ============================================
    location / {
        proxy_pass http://frontend:80;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_cache_bypass $http_upgrade;

        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }

    # ============================================
    # BACKEND API
    # ============================================
    location /api/ {
        proxy_pass http://backend:8000;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_buffering off;
    }

    # ============================================
    # DJANGO ADMIN
    # ============================================
    location /admin/ {
        proxy_pass http://backend:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;

        client_max_body_size 100M;
    }

    # ============================================
    # AUTH
    # ============================================
    location /auth/ {
        proxy_pass http://backend:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ============================================
    # STATIC FILES
    # ============================================
    location /static/ {
        alias /home/moapms/moa-planning-system/backend/static/;
        expires 1y;
        access_log off;
    }

    # ============================================
    # MEDIA FILES
    # ============================================
    location /media/ {
        alias /home/moapms/moa-planning-system/backend/media/;
        expires 30d;
        access_log off;
    }

    # ============================================
    # HEALTH CHECK
    # ============================================
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ============================================
    # BLOCK SENSITIVE FILES
    # ============================================
    location ~ /\. {
        deny all;
    }

    location ~* \.(py|db|sqlite3|env|git|log)$ {
        deny all;
    }
}