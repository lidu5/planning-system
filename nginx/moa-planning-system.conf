# MOA Agricultural Planning System - Complete Nginx Configuration
# Server: pms.moa.gov.et | IP: 196.188.248.104 | Port: 80

server {
    listen 80;
    server_name pms.moa.gov.et 196.188.248.104 10.10.20.233 localhost;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name pms.moa.gov.et 196.188.248.104 10.10.20.233 localhost;

    ssl_certificate /etc/ssl/moa/fullchain1.pem;
    ssl_certificate_key /etc/ssl/moa/privkey2.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # ============================================
    # SECURITY HEADERS
    # ============================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # Content Security Policy - adjust as needed
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: https:;
        font-src 'self' data:;
        connect-src 'self' http://pms.moa.gov.et http://196.188.248.104;
        frame-ancestors 'none';
        form-action 'self';
        base-uri 'self';
    " always;

    # ============================================
    # GZIP COMPRESSION
    # ============================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        text/xml
        text/plain
        text/x-component
        application/javascript
        application/xml+rss
        application/json
        application/ld+json
        application/manifest+json
        application/rss+xml
        application/vnd.geo+json
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/opentype
        image/bmp
        image/svg+xml
        image/x-icon
        image/webp
        video/mp4;

    # ============================================
    # LOGGING
    # ============================================
    access_log /var/log/nginx/moa-access.log;
    error_log /var/log/nginx/moa-error.log warn;

    # ============================================
    # FRONTEND - React/Vue Application (with SPA fix)
    # ============================================
    location / {
        proxy_pass http://127.0.0.1:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_cache_bypass $http_upgrade;
        
        # ===== SPA FIX: Handle client-side routing =====
        proxy_intercept_errors on;
        error_page 404 = /index.html;
        # ================================================
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffers
        proxy_buffers 8 16k;
        proxy_buffer_size 32k;
        
        # Hide nginx version
        server_tokens off;
    }

    # ============================================
    # BACKEND API
    # ============================================
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # API specific timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        # Don't buffer API responses
        proxy_buffering off;
        
        # CORS headers
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Accept" always;
        add_header Access-Control-Expose-Headers "Content-Length,Content-Range" always;
        add_header Access-Control-Allow-Credentials "true" always;
        
        # Handle preflight OPTIONS requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Accept" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 1728000;
            add_header Content-Type 'text/plain; charset=utf-8';
            add_header Content-Length 0;
            return 204;
        }
    }

    # ============================================
    # DJANGO ADMIN PANEL
    # ============================================
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Admin specific settings
        client_max_body_size 100M;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ============================================
    # DJANGO AUTH ENDPOINTS
    # ============================================
    location /auth/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Auth specific timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ============================================
    # STATIC FILES (Django)
    # ============================================
    location /static/ {
        alias /home/moapms/moa-planning-system/backend/static/;
        expires 1y;
        add_header Cache-Control "public, immutable, no-transform" always;
        access_log off;
        
        # Security for static files
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Content-Type-Options "nosniff" always;
            try_files $uri =404;
        }
    }

    # ============================================
    # MEDIA FILES (User uploads)
    # ============================================
    location /media/ {
        alias /home/moapms/moa-planning-system/backend/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform" always;
        access_log off;
        
        # Security for media files
        location ~* \.(jpg|jpeg|png|gif|ico|svg|pdf|doc|docx|xls|xlsx|ppt|pptx|webp)$ {
            add_header Cache-Control "public, max-age=2592000" always;
            add_header X-Content-Type-Options "nosniff" always;
            try_files $uri =404;
        }
    }

    # ============================================
    # HEALTH CHECK ENDPOINT
    # ============================================
    location /health {
        access_log off;
        return 200 "healthy\\n";
        add_header Content-Type text/plain;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # ============================================
    # SECURITY: BLOCK SENSITIVE FILES
    # ============================================
    # Block hidden files
    location ~ /\\. {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    # Block sensitive file extensions
    location ~* \.(py|pyc|pyo|pyd|db|sqlite3|log|env|git|svn|htaccess|htpasswd|ini|conf|bak|old|backup|swp|sql)$ {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    # ============================================
    # CUSTOM ERROR PAGES
    # ============================================
    error_page 400 401 402 403 404 /404.html;
    error_page 500 501 502 503 504 /50x.html;

    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }

    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    # ============================================
    # RATE LIMITING (Optional)
    # ============================================
    # Uncomment to enable rate limiting
    # limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    # 
    # location /api/auth/token/ {
    #     limit_req zone=login burst=3 nodelay;
    #     proxy_pass http://backend:8000/api/auth/token/;
    # }
}