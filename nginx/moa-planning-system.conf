# Redirect all HTTP to HTTPS
server {
    listen 80;
    server_name pms.moa.gov.et;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    server_name pms.moa.gov.et;

    ssl_certificate /etc/letsencrypt/live/pms.moa.gov.et/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pms.moa.gov.et/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json image/svg+xml;

    # Frontend SPA
    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # Django Admin
    location /admin/ {
        proxy_pass http://backend:8000;
        client_max_body_size 100M;
    }

    # Static & Media
    location /static/ {
        alias /home/moapms/moa-planning-system/backend/static/;
    }
    location /media/ {
        alias /home/moapms/moa-planning-system/backend/media/;
    }

    # Health
    location /health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Block hidden/sensitive files
    location ~ /\. { deny all; }
    location ~* \.(py|db|log|env|git|svn|htaccess)$ { deny all; }
}